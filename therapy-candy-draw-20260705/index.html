<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>사탕 문장 뽑기</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html{touch-action:manipulation}body{margin:0;min-height:100vh;min-height:100dvh;padding:max(12px,env(safe-area-inset-top)) max(12px,env(safe-area-inset-right)) max(12px,env(safe-area-inset-bottom)) max(12px,env(safe-area-inset-left));font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","맑은 고딕",Arial,sans-serif;color:#272238;background:radial-gradient(circle at 8% 8%,#fff09a,transparent 27%),radial-gradient(circle at 91% 16%,#b0dcff,transparent 26%),radial-gradient(circle at 80% 90%,#ffbfde,transparent 31%),linear-gradient(135deg,#fffdf6,#fbf8ff 48%,#fff7fb);overflow-x:hidden}.app{max-width:1140px;margin:auto}.top{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:16px}h1{margin:0;font-size:clamp(25px,4.2vw,35px);letter-spacing:-1.2px;text-shadow:0 2px 0 #fff}.btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}button{border:0;border-radius:999px;padding:12px 18px;font-size:clamp(15px,2.4vw,17px);font-weight:900;cursor:pointer;font-family:inherit;touch-action:manipulation;user-select:none;-webkit-user-select:none}button:active{transform:scale(.97)}.main{color:#fff;background:linear-gradient(135deg,#6c70ff,#b45cff);box-shadow:0 10px 22px #705cff4d}.sub{color:#4d4d5c;background:#ffffffe8;box-shadow:0 8px 18px #0000001a}.setup{background:#ffffffe6;border-radius:28px;padding:18px;margin-bottom:20px;box-shadow:0 16px 36px #605b9b24;backdrop-filter:blur(8px)}.editor{width:100%;min-height:120px;max-height:36dvh;overflow-y:auto;border:3px solid #ececff;border-radius:20px;padding:15px;font-size:clamp(16px,2.8vw,19px);line-height:1.55;outline:none;background:#fff;white-space:pre-wrap;word-break:keep-all;box-shadow:inset 0 4px 10px #645f960d;-webkit-user-select:text;user-select:text}.editor:focus{border-color:#8a94ff}.count{margin-top:10px;font-weight:900;color:#696983}.board{position:relative;display:flex;flex-wrap:wrap;justify-content:center;align-content:flex-start;gap:3px;min-height:clamp(430px,70dvh,620px);padding:clamp(28px,4vw,42px) clamp(6px,3vw,30px) clamp(34px,4vw,46px);border-radius:clamp(28px,5vw,42px);background:radial-gradient(circle at 18% 24%,#fffffff2,transparent 24%),radial-gradient(circle at 86% 34%,#ffffffa8,transparent 25%),linear-gradient(135deg,#ffffffbf,#ffffff7a);box-shadow:inset 0 0 0 2px #ffffffc7,inset 0 -24px 45px #ffdce838,0 20px 48px #59469024;overflow:hidden}.board:before{content:"";position:absolute;inset:clamp(10px,2.2vw,18px);border-radius:34px;background-image:radial-gradient(circle,#ffb05d33 0 2px,transparent 2px),radial-gradient(circle,#889cff29 0 2px,transparent 2px);background-size:38px 38px,54px 54px;background-position:0 0,14px 22px;pointer-events:none}.empty{width:100%;min-height:330px;display:flex;align-items:center;justify-content:center;color:#777;font-size:24px;font-weight:900}.candy-card{--w:clamp(96px,15vw,156px);--h:clamp(80px,12vw,126px);position:relative;width:var(--w);height:var(--h);flex:0 0 var(--w);margin:var(--mt) var(--mr) var(--mb) var(--ml);padding:0;background:transparent;box-shadow:none;transform:translate(var(--x),var(--y)) rotate(var(--r));z-index:var(--z)}.candy-card:active{transform:translate(var(--x),calc(var(--y) - 4px)) rotate(var(--r)) scale(1.035)}.candy{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 14px 12px #4c387e2e)}.wrap{position:absolute;inset:0;z-index:2}.twist{position:absolute;width:calc(var(--w)*.31);height:calc(var(--h)*.51);top:calc(var(--h)*.25);background:linear-gradient(120deg,#ffffffa3 0 18%,transparent 19% 42%,#00000014 43% 55%,transparent 56%),repeating-linear-gradient(68deg,var(--wl) 0 8px,var(--wm) 8px 16px);opacity:.98;transition:.28s cubic-bezier(.18,.89,.34,1.18);box-shadow:inset 0 2px 8px #ffffff73}.l{left:calc(var(--w)*.03);clip-path:polygon(100% 4%,0 50%,100% 96%,74% 50%);border-radius:18px 7px 7px 18px}.rr{right:calc(var(--w)*.03);clip-path:polygon(0 4%,100% 50%,0 96%,26% 50%);border-radius:7px 18px 18px 7px}.paper{position:absolute;left:calc(var(--w)*.22);top:calc(var(--h)*.2);width:calc(var(--w)*.56);height:calc(var(--h)*.6);border-radius:35px;background:linear-gradient(140deg,#ffffffd1 0 15%,transparent 16% 46%,#00000014 47% 61%,transparent 62%),repeating-linear-gradient(45deg,var(--wl) 0 12px,var(--wm) 12px 24px);border:clamp(4px,.7vw,6px) solid #ffffffe0;overflow:hidden;transition:.28s cubic-bezier(.18,.89,.34,1.18);box-shadow:inset 0 6px 10px #ffffff57,inset 0 -9px 12px #0000001a}.paper:before{content:"";position:absolute;width:142%;height:24px;background:#ffffff80;transform:rotate(-24deg);top:10px;left:-21px}.paper:after{content:"";position:absolute;width:18px;height:18px;border-radius:50%;background:#ffffffc7;top:16px;right:19px}.core{position:absolute;left:50%;top:50%;width:calc(var(--w)*.4);height:calc(var(--h)*.43);transform:translate(-50%,-50%) scale(0);border-radius:50%;background:radial-gradient(circle at 30% 25%,#fffffff5 0 8px,#ffffff59 9px 16px,transparent 17px),radial-gradient(circle at 70% 78%,#0000002e,transparent 34%),linear-gradient(135deg,var(--cl),var(--cm) 62%,var(--cd));box-shadow:inset -7px -9px 12px #00000029,inset 6px 7px 13px #ffffff5c,0 11px 16px #39275838;opacity:0;z-index:4;transition:.28s cubic-bezier(.18,.89,.34,1.25)}.core:after{content:"";position:absolute;width:38%;height:15%;border-radius:50%;left:26%;top:13%;background:#ffffff9e;transform:rotate(-20deg)}.spark{position:absolute;inset:0;pointer-events:none;opacity:0;z-index:6}.spark span{position:absolute;left:50%;top:50%;width:10px;height:10px;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 10px #ffffffe6}.spark span:nth-child(1){background:#fff06a}.spark span:nth-child(2){background:#ff79bd}.spark span:nth-child(3){background:#76d7ff}.spark span:nth-child(4){background:#95ff9f}.spark span:nth-child(5){background:#fff}.spark span:nth-child(6){background:#c191ff}.opening .paper{transform:scale(.72) rotate(14deg);opacity:.28}.opening .l{transform:translateX(calc(var(--w)*-.22)) rotate(-35deg) scale(1.03);opacity:.64}.opening .rr{transform:translateX(calc(var(--w)*.22)) rotate(35deg) scale(1.03);opacity:.64}.opening .core{transform:translate(-50%,-50%) scale(1.15);opacity:1}.opening .spark{opacity:1}.opening .spark span:nth-child(1){animation:b1 .32s ease-out forwards}.opening .spark span:nth-child(2){animation:b2 .32s ease-out forwards}.opening .spark span:nth-child(3){animation:b3 .32s ease-out forwards}.opening .spark span:nth-child(4){animation:b4 .32s ease-out forwards}.opening .spark span:nth-child(5){animation:b5 .32s ease-out forwards}.opening .spark span:nth-child(6){animation:b6 .32s ease-out forwards}@keyframes b1{to{transform:translate(-48px,-38px) scale(.18);opacity:0}}@keyframes b2{to{transform:translate(45px,-36px) scale(.18);opacity:0}}@keyframes b3{to{transform:translate(54px,20px) scale(.18);opacity:0}}@keyframes b4{to{transform:translate(-50px,26px) scale(.18);opacity:0}}@keyframes b5{to{transform:translate(-6px,-54px) scale(.18);opacity:0}}@keyframes b6{to{transform:translate(10px,49px) scale(.18);opacity:0}}.used .paper{transform:translateY(11px) scale(.58) rotate(12deg);opacity:.18;filter:saturate(.35)}.used .twist{filter:saturate(.4);opacity:.55;background:linear-gradient(120deg,#ffffffb3 0 18%,transparent 19% 42%,#0000000d 43% 55%,transparent 56%),repeating-linear-gradient(68deg,#f7f7fb 0 8px,#dedee8 8px 16px)}.used .l{transform:translateX(calc(var(--w)*-.2)) translateY(10px) rotate(-42deg) scale(.88)}.used .rr{transform:translateX(calc(var(--w)*.2)) translateY(10px) rotate(42deg) scale(.88)}.used .core{transform:translate(-50%,-50%) scale(1);opacity:1}.modal{position:fixed;inset:0;background:#201f306e;display:none;align-items:center;justify-content:center;padding:max(18px,env(safe-area-inset-top)) max(18px,env(safe-area-inset-right)) max(18px,env(safe-area-inset-bottom)) max(18px,env(safe-area-inset-left));z-index:30}.modal.show{display:flex}.card{width:min(790px,100%);max-height:calc(100dvh - 36px);overflow:auto;min-height:clamp(220px,38dvh,270px);border-radius:clamp(28px,5vw,40px);background:radial-gradient(circle at 22% 18%,#fffffff9,transparent 37%),radial-gradient(circle at 82% 82%,#ffffff8c,transparent 31%),linear-gradient(135deg,#fff0a9,#ffd1e8);box-shadow:0 28px 78px #00000040;padding:clamp(24px,5vw,36px);display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;animation:cin .2s ease;border:7px solid #fff}@keyframes cin{from{transform:scale(.9) translateY(10px);opacity:0}to{transform:scale(1);opacity:1}}.label{font-size:clamp(18px,3.5vw,22px);font-weight:900;color:#7763d6;margin-bottom:16px}.sentence{font-size:clamp(30px,8vw,58px);line-height:1.35;font-weight:900;word-break:keep-all;letter-spacing:-1px}.close{margin-top:26px;background:#fff;color:#4d4d5c;min-width:140px;box-shadow:0 9px 20px #00000021}.hidden{display:none}@media(max-width:820px){.top{align-items:flex-start;flex-direction:column}.btns{width:100%;justify-content:flex-start}}@media(max-width:520px){.btns{display:grid;grid-template-columns:1fr 1fr;width:100%}.main{grid-column:1/-1}button{width:100%}.board{min-height:calc(100dvh - 172px);padding:25px 4px 30px}.candy-card{--w:clamp(92px,29vw,118px);--h:clamp(78px,25vw,100px)}.paper:after{width:13px;height:13px;top:12px;right:14px}}@media(orientation:landscape) and (max-height:520px){body{padding:10px}.top{flex-direction:row;align-items:center;margin-bottom:10px}.btns{width:auto;display:flex}.setup{margin-bottom:10px}.editor{min-height:84px}.board{min-height:300px;padding-top:24px;padding-bottom:24px}.card{min-height:200px}}</style></head><body><div class="app"><div class="top"><h1>사탕 문장 뽑기</h1><div class="btns"><button class="main" onclick="makeCandies()">사탕 만들기</button><button class="sub" onclick="nativeInput()">문장 넣기</button><button class="sub" onclick="toggleSetup()">문장 편집</button><button class="sub" onclick="makeCandies()">다시 하기</button></div></div><div class="setup" id="setup"><div id="input" class="editor" contenteditable="true" role="textbox" aria-multiline="true" spellcheck="false">웹툰도 재밌다!
00이는 돼지띠네!
된장찌개하고 참외가 나온대.
그거 괜찮은 방법인데?</div><div class="count" id="count">0개</div></div><div class="board" id="board"></div></div><div class="modal" id="modal" onclick="closeModal(event)"><div class="card"><div class="label">뽑힌 문장</div><div class="sentence" id="sentence"></div><button class="close" onclick="hideModal()">확인</button></div></div><script>const input=document.getElementById('input'),board=document.getElementById('board'),count=document.getElementById('count'),modal=document.getElementById('modal'),sentence=document.getElementById('sentence'),setup=document.getElementById('setup');const pals=[["#ff5e7e","#ffd1db","#ff8fa6","#ff5074","#c92d50"],["#6b7cff","#dbe0ff","#9ca8ff","#6276ff","#3a49c6"],["#20bfa9","#c9fff4","#70ead8","#20cbb3","#0b8f7f"],["#ff9e2c","#ffe0b7","#ffc16d","#ff9822","#c55e00"],["#9b59ff","#ead7ff","#c9a0ff","#9859ff","#6835c4"],["#ffcc32","#fff0a8","#ffe071","#ffc526","#bd8d00"],["#40a7ff","#d7eeff","#8bd0ff","#34a0ff","#1d6bb5"],["#ff70c8","#ffd8f1","#ffa9dc","#ff68c6","#be338a"],["#30c95b","#d5ffd9","#83ef99","#28c658","#158439"]];let used=new Set;function txt(){return(input.innerText||input.textContent||'').replace(/\u00a0/g,' ').replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim()}function save(){try{localStorage.setItem('candySentences',txt())}catch(e){}}function setText(t){input.textContent=t||'';save();updateCount()}function nativeInput(){let v=prompt('문장을 입력하세요. 줄바꿈이 안 되면 ! ? . ~ / 로 구분해도 됩니다.',txt());if(v!==null){setText(v);setTimeout(makeCandies,80)}}function sentences(){let t=txt();if(!t)return[];let lines=t.split(/\n+/).map(x=>x.trim()).filter(Boolean);if(lines.length>1)return lines;return t.replace(/([.!?~。！？]+)/g,'$1\n').replace(/[\/|]+/g,'\n').split(/\n+/).map(x=>x.trim()).filter(Boolean)}function updateCount(){count.textContent=sentences().length+'개'}input.addEventListener('input',()=>{save();updateCount()});input.addEventListener('compositionend',()=>{save();updateCount()});input.addEventListener('blur',()=>{save();updateCount()});function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a}function range(){let w=innerWidth;if(w<=380)return{a:25,m:7,t:[-4,9],s:[-3,4],b:[-3,9]};if(w<=520)return{a:30,m:9,t:[-5,11],s:[-4,6],b:[-4,11]};if(w<=820)return{a:34,m:13,t:[-8,16],s:[-7,9],b:[-5,15]};return{a:39,m:20,t:[-10,20],s:[-10,13],b:[-7,20]}}function makeCandies(){input.blur();setTimeout(()=>{let arr=sentences(),r=range();save();used=new Set;board.innerHTML='';if(!arr.length){board.innerHTML='<div class="empty">문장을 입력해 주세요</div>';updateCount();return}arr=arr.map(v=>({v,s:Math.random()})).sort((a,b)=>a.s-b.s).map(o=>o.v);arr.forEach((s,i)=>{let c=document.createElement('button'),p=pals[i%pals.length];c.className='candy-card';c.dataset.index=i;c.dataset.sentence=s;c.style.setProperty('--wm',p[0]);c.style.setProperty('--wl',p[1]);c.style.setProperty('--cl',p[2]);c.style.setProperty('--cm',p[3]);c.style.setProperty('--cd',p[4]);c.style.setProperty('--r',ri(-r.a,r.a)+'deg');c.style.setProperty('--x',ri(-r.m,r.m)+'px');c.style.setProperty('--y',ri(-r.m,r.m)+'px');c.style.setProperty('--z',ri(1,9));c.style.setProperty('--mt',ri(r.t[0],r.t[1])+'px');c.style.setProperty('--mr',ri(r.s[0],r.s[1])+'px');c.style.setProperty('--mb',ri(r.b[0],r.b[1])+'px');c.style.setProperty('--ml',ri(r.s[0],r.s[1])+'px');c.innerHTML='<div class="candy"><div class="wrap"><div class="twist l"></div><div class="paper"></div><div class="twist rr"></div></div><div class="core"></div><div class="spark"><span></span><span></span><span></span><span></span><span></span><span></span></div></div>';c.onclick=()=>openCandy(c);board.appendChild(c)});updateCount();setup.classList.add('hidden')},100)}function openCandy(c){let i=+c.dataset.index,s=c.dataset.sentence;if(used.has(i)){show(s);return}used.add(i);c.classList.add('opening');setTimeout(()=>{c.classList.remove('opening');c.classList.add('used');show(s)},320)}function show(s){sentence.textContent=s;modal.classList.add('show')}function hideModal(){modal.classList.remove('show')}function closeModal(e){if(e.target===modal)hideModal()}function toggleSetup(){setup.classList.toggle('hidden');if(!setup.classList.contains('hidden'))setTimeout(()=>input.focus(),80)}document.addEventListener('keydown',e=>{if(e.key==='Escape')hideModal()});addEventListener('orientationchange',()=>setTimeout(makeCandies,250));try{let v=localStorage.getItem('candySentences');if(v)setText(v)}catch(e){}updateCount();makeCandies();</script></body></html>
